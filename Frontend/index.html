<!doctype html>
<html lang="am" dir="ltr">
  <head>
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- ESSENTIAL META TAGS -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- PRIMARY META TAGS -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <title>
      Seid-Electronics | Premium Electronics & Tech Products Online Store
    </title>
    <meta
      name="title"
      content="Seid-Electronics | Premium Electronics & Tech Products Online Store"
    />
    <link rel="icon" type="image/png" href="/seid-electronic-favicon.png" />
    <link
      rel="shortcut icon"
      href="/seid-electronic-favicon.png"
      type="image/png"
    />
    <meta
      name="description"
      content="Shop premium electronics, laptops, smartphones, accessories, and tech gadgets at Seid-Electronics. Fast delivery, competitive prices, and authentic products. Your trusted electronics store."
    />
    <meta
      name="keywords"
      content="electronics store, laptops, smartphones, tech gadgets, computer accessories, premium electronics, online electronics shop, Seid-Electronics"
    />
    <meta name="author" content="Seid-Electronics" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />
    <meta name="googlebot" content="index, follow" />
    <meta name="language" content="Amharic, English, Afaan Oromo" />
    <meta name="revisit-after" content="7 days" />
    <meta name="rating" content="general" />

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- CANONICAL & ALTERNATE LINKS -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <link rel="canonical" href="https://seid-electronics.com/" />

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- OPEN GRAPH / FACEBOOK META TAGS -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://seid-electronics.com/" />
    <meta property="og:site_name" content="Seid-Electronics" />
    <meta
      property="og:title"
      content="Seid-Electronics | Premium Electronics & Tech Products"
    />
    <meta
      property="og:description"
      content="Shop premium electronics, laptops, smartphones, and tech gadgets. Fast delivery and competitive prices."
    />
    <meta
      property="og:image"
      content="https://seid-electronics.com/og-image.png"
    />
    <meta
      property="og:image:secure_url"
      content="https://seid-electronics.com/og-image.png"
    />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Seid-Electronics - Premium Electronics Store"
    />
    <meta property="og:locale" content="en_US" />

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- TWITTER / X CARD META TAGS -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://seid-electronics.com/" />
    <meta
      name="twitter:title"
      content="Seid-Electronics | Premium Electronics & Tech Products"
    />
    <meta
      name="twitter:description"
      content="Shop premium electronics, laptops, smartphones, and tech gadgets. Fast delivery and competitive prices."
    />
    <meta
      name="twitter:image"
      content="https://seid-electronics.com/og-image.png"
    />
    <meta
      name="twitter:image:alt"
      content="Seid-Electronics - Premium Electronics Store"
    />
    <meta name="twitter:creator" content="@SeidElectronics" />
    <meta name="twitter:site" content="@SeidElectronics" />

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- THEME & APPEARANCE -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <meta
      name="theme-color"
      content="#000000"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta name="color-scheme" content="dark light" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Seid-Electronics" />
    <meta name="format-detection" content="telephone=no" />

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- FAVICONS & ICONS -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- Main Favicon is set above in Primary Meta Tags -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/icons/apple-touch-icon.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="152x152"
      href="/icons/apple-touch-icon-152x152.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="167x167"
      href="/icons/apple-touch-icon-167x167.png"
    />
    <link rel="mask-icon" href="/icons/safari-pinned-tab.svg" color="#000000" />

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- PWA MANIFEST -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- PRECONNECT & DNS-PREFETCH FOR PERFORMANCE -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- NOTO SANS ETHIOPIC — Required for Amharic script rendering          -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;600;700&display=swap"
    />

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- SITEMAP & SEARCH ENGINE DISCOVERY -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <link
      rel="sitemap"
      type="application/xml"
      title="Sitemap"
      href="/sitemap.xml"
    />

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- STRUCTURED DATA (JSON-LD) -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Store",
        "name": "Seid-Electronics",
        "description": "Premium electronics and tech products online store",
        "url": "https://seid-electronics.com",
        "logo": "https://seid-electronics.com/logo.png",
        "image": "https://seid-electronics.com/og-image.png",
        "priceRange": "$$",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "ET"
        },
        "sameAs": [
          "https://facebook.com/seidelectronics",
          "https://twitter.com/seidelectronics",
          "https://instagram.com/seidelectronics"
        ],
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://seid-electronics.com/shop?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- ACCESSIBILITY -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <meta name="application-name" content="Seid-Electronics" />

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- MICROSOFT TILES -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <meta name="msapplication-TileColor" content="#000000" />
    <meta name="msapplication-TileImage" content="/icons/mstile-144x144.png" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
  </head>

  <body>
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- NO JAVASCRIPT FALLBACK -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <noscript>
      <div
        style="
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: #fff;
          color: #000;
          display: flex;
          align-items: center;
          justify-content: center;
          flex-direction: column;
          padding: 2rem;
          text-align: center;
          font-family:
            system-ui,
            -apple-system,
            sans-serif;
          z-index: 9999;
        "
      >
        <h1 style="font-size: 2rem; margin-bottom: 1rem">
          JavaScript Required
        </h1>
        <p style="font-size: 1.125rem; max-width: 600px; line-height: 1.6">
          Seid-Electronics requires JavaScript to function properly. Please
          enable JavaScript in your browser settings to continue shopping.
        </p>
      </div>
    </noscript>

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- REACT ROOT -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <div id="root"></div>

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- APPLICATION ENTRY POINT -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
